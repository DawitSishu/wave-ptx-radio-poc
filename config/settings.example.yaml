# Copy to settings.yaml and fill in. Keep settings.yaml out of git.

audio_dir: "C:/wave-poc/audio"
schedule_file: "C:/wave-poc/config/schedule.yaml"

# Windows playback device the engine plays into.
#   - Phase A demo (hear it over RDP): leave null to use the default device.
#   - Production: set to the VB-Cable device feeding WAVE PTX's mic.
# Find exact names with:  python -m sounddevice
# On this VM the VB-Cable playback endpoint shows as "Speakers (VB-Audio Point)".
output_device: null

# PTT timing (seconds) — tuned so the start of audio is never clipped.
ptt_grant_wait: 1.0      # wait for the talk-permit grant after pressing PTT
ptt_lead_silence: 0.5    # silence padded to the front of every clip
ptt_tail_hold: 0.3       # keep PTT held this long after audio ends
ptt_busy_retry: 3        # retries when the floor/channel is busy
ptt_busy_backoff: 5      # seconds between retries

# Transmit adapter:
#   loopback -> Phase A: plays + logs, no real transmit (tests the engine)
#   dispatch -> Phase B: drives the WAVE PTX Dispatch web console
ptt_adapter: "loopback"

alerts:
  slack_webhook: ""      # fill at least one channel
  email_to: ""
  email_from: ""
  smtp_host: ""
  smtp_user: ""
  smtp_password: ""

log_file: "C:/wave-poc/logs/broadcasts.log"

# Monitoring (the "tell us if it stops" pieces)
heartbeat_minutes: 15                          # engine logs an "alive" line this often
heartbeat_file: "C:/wave-poc/logs/heartbeat.txt"  # engine touches this every loop
watchdog_max_age_seconds: 180                  # watchdog alerts if heartbeat older than this

# Radio.co as upstream source of truth (prompts + schedule sync down to the VM)
radioco:
  station_id: ""        # from the Studio dashboard URL: studio.radio.co/stations/<ID>/dashboard
  # Stream relay (radioco_relay.py): leave relay_match empty to relay everything the
  # station plays, or set a substring to only relay matching track titles.
  relay_match: ""
